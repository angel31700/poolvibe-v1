name: poolvibe
description: PoolVibe — your pool decision engine.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Image picking & storage
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Local storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  video_player: ^2.8.6        # for Water_Login.mp4 onboarding bg
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0        # affiliate links
  path_provider: ^2.1.3
  dio: ^5.4.3                 # HTTP for future backend

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/media/
  fonts:
    - family: PoolVibe
      fonts:
        - asset: assets/fonts/PoolVibe-Regular.ttf
          weight: 400
        - asset: assets/fonts/PoolVibe-Bold.ttf
          weight: 700
